<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нэвтрэх</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: #ffffff;
            border-radius: 16px;
            padding: 48px 40px 40px 40px;
            width: 340px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .login-box h1 {
            font-size: 26px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 28px;
            text-align: center;
        }

        .input-group {
            width: 100%;
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            background-color: #eef2f7;
            border: 1.5px solid #dce3ed;
            border-radius: 10px;
            padding: 13px 16px;
            font-size: 15px;
            color: #333;
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .input-group input:focus {
            border-color: #9face6;
            background-color: #f5f8ff;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(90deg, #7b5ea7 0%, #9face6 100%);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .error-msg {
            color: #e53935;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="login-box">
        <h1>Нэвтрэх</h1>
        <div class="input-group">
            <input type="text" id="username" placeholder="admin" value="admin">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="••••••">
        </div>
        <button class="btn-login" onclick="handleLogin()">Нэвтрэх</button>
        <p class="error-msg" id="errorMsg">Нэвтрэх нэр эсвэл нууц үг буруу байна!</p>
    </div>

    <script>
        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (username === 'admin' && password === 'admin123') {
                window.location.href = 'admin.html';
            } else {
                errorMsg.style.display = 'block';
            }
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
