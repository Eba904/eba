<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мэдээ удирдах</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #1a73e8;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* Form Card */
        .form-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 36px 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            margin-bottom: 30px;
        }

        .form-card h2 {
            font-size: 22px;
            font-weight: 800;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            border: 1.5px solid #dce3ed;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            color: #333;
            outline: none;
            background: #fff;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #aab0bc;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #1a73e8;
        }

        .form-group textarea {
            height: 100px;
            resize: vertical;
        }

        .btn-add {
            display: block;
            margin: 20px auto 0 auto;
            background-color: #1a73e8;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 12px 36px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-add:hover {
            background-color: #1558b0;
        }

        /* Table Card */
        .table-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            overflow: hidden;
        }

        .table-card h3 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            text-align: center;
            padding: 22px 0 18px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background-color: #1a73e8;
        }

        thead th {
            color: #ffffff;
            padding: 13px 16px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }

        tbody tr {
            border-bottom: 1px solid #eef2f7;
            transition: background-color 0.15s;
        }

        tbody tr:hover {
            background-color: #f5f8ff;
        }

        tbody td {
            padding: 12px 16px;
            font-size: 13px;
            color: #333;
            text-align: center;
            vertical-align: middle;
        }

        tbody td:nth-child(2) {
            text-align: left;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        tbody td:nth-child(3) {
            text-align: left;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn-delete {
            background: none;
            border: none;
            color: #e53935;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .btn-delete:hover {
            color: #b71c1c;
            text-decoration: underline;
        }

        .btn-edit {
            background: none;
            border: none;
            color: #1a73e8;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 8px;
            transition: color 0.2s;
        }

        .btn-edit:hover {
            color: #1558b0;
            text-decoration: underline;
        }

        .empty-row td {
            color: #aab0bc;
            font-style: italic;
            padding: 20px;
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="container">
        <a href="admin.html" class="back-link">← Буцах</a>

        <!-- Add News Form -->
        <div class="form-card">
            <h2>Мэдээ нэмэх</h2>
            <div class="form-group">
                <label>Мэдээний нэр</label>
                <input type="text" id="newsTitle" placeholder="Мэдээний нэр">
            </div>
            <div class="form-group">
                <label>Тайлбар</label>
                <textarea id="newsDesc" placeholder="Мэдээний тайлбар"></textarea>
            </div>
            <div class="form-group">
                <label>Зураг холбоос (URL)</label>
                <input type="text" id="newsImg" placeholder="https://...">
            </div>
            <button class="btn-add" onclick="addNews()">Нэмэх</button>
        </div>

        <!-- News Table -->
        <div class="table-card">
            <h3>Мэдээнүүд</h3>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Гарчиг</th>
                        <th>Тайлбар</th>
                        <th>Үйлдэл</th>
                    </tr>
                </thead>
                <tbody id="newsTableBody">
                    <tr>
                        <td>1</td>
                        <td>Төслийн нэр</td>
                        <td>Төслийн тайлбар</td>
                        <td>
                            <button class="btn-edit" onclick="editRow(this)">Засах</button>
                            <button class="btn-delete" onclick="deleteRow(this)">Устгах</button>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Төслийн нэр</td>
                        <td>Төслийн тайлбар</td>
                        <td>
                            <button class="btn-edit" onclick="editRow(this)">Засах</button>
                            <button class="btn-delete" onclick="deleteRow(this)">Устгах</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let counter = 3;

        function addNews() {
            const title = document.getElementById('newsTitle').value.trim();
            const desc = document.getElementById('newsDesc').value.trim();

            if (!title) {
                alert('Мэдээний нэрийг бөглөнө үү!');
                return;
            }

            const tbody = document.getElementById('newsTableBody');
            const emptyRow = tbody.querySelector('.empty-row');
            if (emptyRow) emptyRow.remove();

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${counter++}</td>
                <td>${title}</td>
                <td>${desc || '-'}</td>
                <td>
                    <button class="btn-edit" onclick="editRow(this)">Засах</button>
                    <button class="btn-delete" onclick="deleteRow(this)">Устгах</button>
                </td>
            `;
            tbody.appendChild(tr);

            document.getElementById('newsTitle').value = '';
            document.getElementById('newsDesc').value = '';
            document.getElementById('newsImg').value = '';
        }

        function deleteRow(btn) {
            btn.closest('tr').remove();
            const tbody = document.getElementById('newsTableBody');
            if (tbody.rows.length === 0) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="4">Мэдээ байхгүй байна</td></tr>';
            }
            // Re-number
            Array.from(tbody.rows).forEach((row, i) => {
                if (!row.classList.contains('empty-row')) row.cells[0].textContent = i + 1;
            });
        }

        function editRow(btn) {
            const tr = btn.closest('tr');
            const title = tr.cells[1].textContent;
            const desc = tr.cells[2].textContent;
            document.getElementById('newsTitle').value = title;
            document.getElementById('newsDesc').value = desc === '-' ? '' : desc;
            tr.remove();
            counter--;
            // Re-number
            const tbody = document.getElementById('newsTableBody');
            Array.from(tbody.rows).forEach((row, i) => {
                if (!row.classList.contains('empty-row')) row.cells[0].textContent = i + 1;
            });
        }
    </script>
</body>
</html>
